<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日誌一覧 — sola</title>
<link rel="stylesheet" href="/assets/sola.css">
</head>
<body>
<div id="sola-header"></div>
<script src="/assets/sola-common.js"></script>
<script>renderSolaHeader();</script>

<main class="sola-page">
  <div class="sola-page-head">
    <div class="sola-page-title">日誌一覧</div>
    <button class="sola-btn sola-btn-primary">＋ 新規登録</button>
  </div>

  <!-- フィルターバー -->
  <div class="sola-filter">
    <div class="sola-filter-field">
      <label>担当者</label>
      <select id="f-user" oninput="filter()">
        <option value="">すべて</option>
        <option>西川 公大</option>
        <option>山田 太郎</option>
        <option>鈴木 次郎</option>
        <option>田村 花子</option>
      </select>
    </div>
    <div class="sola-filter-field">
      <label>顧客名</label>
      <input type="text" id="f-customer" placeholder="例：田中" oninput="filter()">
    </div>
    <div class="sola-filter-field">
      <label>現場名</label>
      <input type="text" id="f-site" placeholder="例：内装改修" oninput="filter()">
    </div>
    <div class="sola-filter-field">
      <label>区分</label>
      <select id="f-type" oninput="filter()">
        <option value="">すべて</option>
        <option>電話</option>
        <option>訪問</option>
        <option>メール</option>
        <option>現場作業</option>
      </select>
    </div>
    <div class="sola-filter-actions">
      <button class="sola-btn sola-btn-secondary" onclick="resetFilter()">リセット</button>
      <button class="sola-btn sola-btn-primary">検索する</button>
    </div>
  </div>

  <div class="sola-table-wrap">
    <table class="sola-table">
      <thead>
        <tr>
          <th style="width:110px">日付</th>
          <th style="width:90px">区分</th>
          <th style="width:180px">顧客 / 現場</th>
          <th>作業内容</th>
          <th style="width:140px">担当 / 更新</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</main>

<script>
const rows = [
  {date:'2026/04/04', type:'現場作業', customer:'田中 一郎 様', site:'田中邸 内装改修工事', body:'2Fクロス張り施工。下地補修発生のため工期延長の見込み。', user:'山田 太郎', updated:'2026/04/04'},
  {date:'2026/04/03', type:'電話', customer:'田中 一郎 様', site:'田中邸 内装改修工事', body:'工期遅延について施主に説明。3/25完了見込みを了承いただいた。', user:'西川 公大', updated:'2026/04/03'},
  {date:'2026/04/02', type:'訪問', customer:'株式会社ハウスワン', site:'住吉モデルハウス外構', body:'現地打ち合わせ。仕様書の最終確認を実施。', user:'西川 公大', updated:'2026/04/02'},
  {date:'2026/04/01', type:'メール', customer:'山本 三郎 様', site:'山本邸 新築工事', body:'見積書送付。質問回答を後日訪問で対応予定。', user:'田村 花子', updated:'2026/04/01'},
  {date:'2026/03/30', type:'現場作業', customer:'鈴木 工務店', site:'鈴木邸リフォーム', body:'キッチン解体完了。給排水の位置調整が必要。', user:'鈴木 次郎', updated:'2026/03/30'},
  {date:'2026/03/28', type:'訪問', customer:'JF株式会社', site:'JF新築工事 A棟', body:'定例打ち合わせ。工程表の更新を共有。', user:'西川 公大', updated:'2026/03/28'},
  {date:'2026/03/25', type:'電話', customer:'佐藤 建設株式会社', site:'天王寺マンション改修', body:'資材納期の確認。4/5着荷予定。', user:'田村 花子', updated:'2026/03/25'},
  {date:'2026/03/22', type:'現場作業', customer:'高橋 美咲 様', site:'高橋邸 水回りリフォーム', body:'洗面台設置完了。最終清掃を明日実施。', user:'山田 太郎', updated:'2026/03/22'},
];

const typeBadge = {
  '電話':  'info',
  '訪問':  'success',
  'メール': 'warning',
  '現場作業':'neutral',
};

function render(list) {
  const tbody = document.getElementById('tbody');
  if (list.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#9CA3AF;padding:24px">該当する日誌が見つかりませんでした</td></tr>';
    return;
  }
  tbody.innerHTML = list.map(r => `
    <tr>
      <td>${r.date}</td>
      <td><span class="sola-badge sola-badge-${typeBadge[r.type]||'neutral'}">${r.type}</span></td>
      <td>
        <div style="font-weight:700">${r.customer}</div>
        <div style="font-size:11px;color:#666">${r.site}</div>
      </td>
      <td style="color:#333">${r.body}</td>
      <td>
        <div class="sola-cell-stack">
          <span class="top">${r.user}</span>
          <span class="bottom">${r.updated}</span>
        </div>
      </td>
    </tr>
  `).join('');
}

function filter() {
  const u = document.getElementById('f-user').value;
  const c = document.getElementById('f-customer').value.toLowerCase();
  const s = document.getElementById('f-site').value.toLowerCase();
  const t = document.getElementById('f-type').value;
  render(rows.filter(r =>
    (!u || r.user === u) &&
    (!c || r.customer.toLowerCase().includes(c)) &&
    (!s || r.site.toLowerCase().includes(s)) &&
    (!t || r.type === t)
  ));
}

function resetFilter() {
  document.getElementById('f-user').value = '';
  document.getElementById('f-customer').value = '';
  document.getElementById('f-site').value = '';
  document.getElementById('f-type').value = '';
  render(rows);
}

render(rows);
</script>
</body>
</html>
